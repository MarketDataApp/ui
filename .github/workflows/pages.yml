name: 'UI: Deploy to GitHub Pages'

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build docs CSS
        run: npx tailwindcss -i docs/docs.input.css -o docs/docs.css

      - name: Assemble site
        run: |
          mkdir -p _site/docs _site/dist
          CACHE_BUST="${GITHUB_SHA:0:7}"
          for f in docs/*.html; do
            sed "s|\.css\"|.css?v=$CACHE_BUST\"|; s|\.js';|.js?v=$CACHE_BUST';|" "$f" > "_site/docs/$(basename "$f")"
          done
          cp -n docs/*.avif _site/docs/ 2>/dev/null || true
          cp docs/docs.css "_site/docs/docs.css"
          for f in dist/user.js dist/user-profile.js dist/theme-toggle.js dist/theme.js dist/navbar-overflow.js dist/dark-images.js dist/reviews.js dist/reviews.platform.js; do
            sed "s|\.js';|.js?v=$CACHE_BUST';|" "$f" > "_site/$f"
          done
          echo '<meta http-equiv="refresh" content="0;url=docs/">' > _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_ALERTS_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          WORKFLOW: ${{ github.workflow }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          printf '🔴 WORKFLOW FAILED — %s\nRepo: %s\nBranch: %s @ %s\n%s' \
            "$WORKFLOW" "$REPO" "$BRANCH" "$SHORT_SHA" "$RUN_URL" \
            | jq -Rs '{text: .}' \
            | curl -s -X POST "$SLACK_WEBHOOK" -H 'Content-Type: application/json' -d @-
